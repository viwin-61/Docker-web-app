name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Docker Login (FIXED)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push Image
      - name: Build & Push Image
        run: |
          docker build -t viwinprabakaran/viwin-app .
          docker push viwinprabakaran/viwin-app

      # ✅ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop viwin-app || true
            sudo docker rm viwin-app || true
            sudo docker pull viwinprabakaran/viwin-app
            sudo docker run -d -p 80:80 --name viwin-app viwinprabakaran/viwin-app
